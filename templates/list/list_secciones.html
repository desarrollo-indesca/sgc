{% extends 'base.html' %}

{% block title %}Lista de Secciones{% endblock %}

{% block content %}
    <div class="p-3">
        <h1 class="text-lg text-center font-bold">Secciones</h1>

        <hr>

        <ol>
            {% for seccion in secciones %}
                <li class="text-primary">
                    {{ forloop.counter}}. <a href="#">{{ seccion }}</a>

                    <hr>
                </li>
            {% endfor %}
        </ol>
    </div>
{% endblock %}
