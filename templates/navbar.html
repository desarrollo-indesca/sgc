{% load static %}

<nav class="navbar-gradient shadow-2xl w-full">
  <div class="navbar-container flex flex-wrap items-center justify-evenly mx-auto p-4">
      <a href="/" class="flex items-center space-x-3 rtl:space-x-reverse group">
          <div class="navbar-logo-container">
              <img src="{% static 'img/logo.svg' %}" class="navbar-logo" alt="Indesca Logo" />
          </div>
          <span class="navbar-text md:text-lg sm:text-sm xs:text-xs">&nbsp;Sistema de Gestión de la Calidad</span>
      </a>
     
      <div class="hidden w-full md:block md:w-auto" id="navbar-default">
          <ul class="navbar-menu text-sm font-medium flex flex-col items-center p-4 md:p-0 mt-4 rounded-lg md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0">

          </ul>
      </div>
      
      {% if request.user.is_authenticated %}
      <div class="dropdown" id="user-dropdown">
          <button class="user-button btn shadow-lg" id="user-button">
              <span class="flex items-center space-x-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                  <span>{{request.user.get_full_name}}</span>
              </span>
          </button>
          <form method="post" action="{% url 'logout' %}">
              <ul class="user-dropdown menu dropdown-content rounded-box z-[1] w-52 p-2 hidden" id="user-dropdown-menu">
                  <li class="user-dropdown-item rounded-md">
                      {% csrf_token %}
                      <button class="w-full h-full text-left px-4 py-2 rounded-md flex items-center space-x-2" type="submit">
                          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                          </svg>
                          <span>Cerrar Sesión</span>
                      </button>
                  </li>
              </ul>
          </form>
      </div>
      {% endif %}
  </div>

  {% if request.user.is_superuser and request.path != '/list/' %}
  <div class="navbar-second-row flex items-center justify-between">
    
      <div class="navbar-links flex items-center space-x-8">
        &nbsp;
        {% if request.user.is_superuser %}
          <label for="creacion-carpeta" class="btn btn-sm btn-gray-600"> + Nueva Carpeta </label>
          {% if not no_crear_archivo %}
          <label for="creacion-archivo" class="btn btn-sm btn-gray-600"> + Nuevo Archivo </label>
          {% endif %}
        {% endif %}
      </div>
  </div>
  {% endif %}
</nav>

<script>
  const userButton = document.getElementById('user-button');
  const userDropdownMenu = document.getElementById('user-dropdown-menu');

  function toggleDropdown() {
      userDropdownMenu.classList.toggle('hidden');
  }

  if (userButton) {
      userButton.addEventListener('click', toggleDropdown);
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', function(event) {
      if (!event.target.closest('#user-dropdown')) {
          if (userDropdownMenu && !userDropdownMenu.classList.contains('hidden')) {
              userDropdownMenu.classList.add('hidden');
          }
      }
  });
</script>
